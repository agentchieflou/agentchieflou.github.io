<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Michael Louard — Skills</title>
<meta name="description" content="Live skill-to-market alignment: my skills, current top job matches, and the gaps between them." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0f12;
    --ink: #e8eaed;
    --dim: #9aa0a6;
    --line: rgba(232, 234, 237, 0.14);
    --accent: #c9a86a;
    --accent-2: #9ba8b8;
    --card-bg: #14161b;
    --hover-bg: rgba(201, 168, 106, 0.08);
    --kate-pink: #f2a5b8;
    /* Validated categorical palette (passes CVD/contrast checks on both surfaces).
       Same hues in both themes — identity colors follow the entity, not the theme. */
    --cat-analytics: #3987e5;
    --cat-engineering: #d55181;
    --cat-tools: #c98500;
    --cat-domain: #008300;
  }

  body.kate-mode {
    --bg: #170e13;
    --ink: #f7eef1;
    --dim: #c9b3ba;
    --line: rgba(242, 165, 184, 0.18);
    --accent: #f2a5b8;
    --accent-2: #d9a441;
    --card-bg: #1e1318;
    --hover-bg: rgba(242, 165, 184, 0.1);
  }

  body.kate-mode .normal-only { display: none !important; }
  body:not(.kate-mode) .kate-only { display: none !important; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100dvh;
    overflow: hidden;
    transition: background 0.4s ease, color 0.4s ease;
  }

  /* Static hyperbolic geodesic grid — drawn once, no animation loop */
  #field { position: fixed; inset: 0; z-index: 0; }

  .hud {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 22px clamp(20px, 4vw, 48px);
    font-family: "Space Grotesk", sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 12px;
    color: var(--dim);
  }
  .brand { color: var(--ink); font-weight: 700; letter-spacing: 0.3em; text-decoration: none; }
  .hud-title { flex: 1; text-align: center; }

  .kate-toggle-btn {
    position: fixed;
    right: 18px;
    bottom: 14px;
    z-index: 30;
    background: transparent;
    border: 1px solid rgba(242, 165, 184, 0.45);
    color: var(--kate-pink);
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: "Space Grotesk", sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: border-color 0.2s ease, background 0.2s ease;
    outline: none;
  }
  .kate-toggle-btn:hover { border-color: var(--kate-pink); background: rgba(242, 165, 184, 0.1); }

  /* ---------- stage: controls + scrollable views ---------- */
  .stage {
    position: relative;
    z-index: 4;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 0 clamp(14px, 4vw, 48px);
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px 18px;
    padding: 2px 0 14px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .seg button {
    background: none;
    border: none;
    color: var(--dim);
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    padding: 7px 16px;
    cursor: pointer;
  }
  .seg button.active { background: var(--hover-bg); color: var(--accent); }
  .seg button:focus-visible { outline: 1px solid var(--accent); outline-offset: -1px; }
  .ctl { display: inline-flex; align-items: center; gap: 7px; }
  .ctl select {
    background: var(--card-bg);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    font: 11px "Inter", sans-serif;
    padding: 6px 8px;
    cursor: pointer;
  }

  .views {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding-bottom: 16px;
  }
  .views.graph-active { overflow: hidden; padding-bottom: 0; }

  /* ---------- Demand matrix ---------- */
  table.matrix { border-collapse: separate; border-spacing: 2px; font-size: 12.5px; }
  .matrix th { font-weight: 400; color: var(--dim); text-align: left; white-space: nowrap; }
  .matrix thead th.skill-h { height: 128px; vertical-align: bottom; width: 27px; }
  .matrix thead th.skill-h > span {
    display: block;
    transform: rotate(-58deg);
    transform-origin: bottom left;
    width: 23px;
    white-space: nowrap;
    font-size: 11.5px;
  }
  .matrix thead .cdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
  .matrix td.cell { width: 27px; height: 25px; border-radius: 4px; background: rgba(232, 234, 237, 0.04); }
  .matrix td.cell.gap { background: none; border: 1.5px dashed var(--dim); }
  .matrix td.cell:hover { outline: 1px solid var(--accent); }
  .matrix th.job { padding-right: 12px; max-width: min(300px, 38vw); overflow: hidden; text-overflow: ellipsis; }
  .matrix th.job button {
    background: none;
    border: none;
    color: var(--ink);
    font: 12.5px/1.35 "Inter", sans-serif;
    text-align: left;
    cursor: pointer;
    padding: 0;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: block;
  }
  .matrix th.job button:hover, .matrix th.job button:focus-visible { color: var(--accent); outline: none; }
  .matrix th.job small { color: var(--dim); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .matrix td.score { font: 600 12px "Space Grotesk", sans-serif; color: var(--accent); padding-left: 10px; font-variant-numeric: tabular-nums; }
  .matrix tfoot td { color: var(--dim); font: 10.5px "Space Grotesk", sans-serif; text-align: center; padding-top: 6px; }
  .matrix tfoot th { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; text-align: right; padding-right: 12px; }

  /* ---------- Match ledger ---------- */
  .ledger { display: flex; flex-direction: column; gap: 10px; max-width: 860px; }
  .lrow {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 4px 16px;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.15s ease;
  }
  .lrow:hover { border-color: var(--accent); }
  .lscore { font: 600 21px/1.1 "Space Grotesk", sans-serif; color: var(--accent); font-variant-numeric: tabular-nums; }
  .lscore small { display: block; font: 400 9.5px "Space Grotesk", sans-serif; letter-spacing: 0.14em; color: var(--dim); margin-top: 2px; text-transform: uppercase; }
  .lmeter { grid-column: 1; height: 4px; border-radius: 2px; background: rgba(232, 234, 237, 0.08); overflow: hidden; align-self: start; }
  .lmeter i { display: block; height: 100%; background: var(--accent); border-radius: 2px; }
  .ltitle { font-weight: 600; font-size: 14.5px; }
  .ltitle a { color: var(--ink); text-decoration: none; }
  .ltitle a:hover, .ltitle a:focus-visible { color: var(--accent); outline: none; }
  .lmeta { color: var(--dim); font-size: 12.5px; margin-top: 2px; }
  .lwhy { grid-column: 2; color: var(--dim); font-size: 12.5px; line-height: 1.5; margin-top: 4px; }
  .lchips { grid-column: 2; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--ink);
    white-space: nowrap;
  }
  .chip.missing { border-style: dashed; color: var(--dim); }
  .chip .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }

  .empty-note { color: var(--dim); font-size: 13px; padding: 18px 0; }

  /* ---------- rolodex (opened from matrix rows): fanned card stack ----------
     Depth is faked with 2D transforms (translateX/rotate/scale/opacity) rather
     than true 3D perspective — compositor-only properties, no backdrop-filter
     or blur on moving elements, so it stays cheap on Safari iOS. Only the
     front card ± 2 neighbors are ever in the DOM (see renderRolodex). */
  .rolodex {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.55);
  }
  .rolodex.open { display: flex; }
  .rolodex-stack {
    position: relative;
    width: min(480px, calc(100vw - 32px));
    height: min(480px, calc(100dvh - 120px));
  }
  .rcard {
    position: absolute;
    left: 50%;
    top: 50%;
    width: min(300px, calc(100vw - 160px));
    max-height: 100%;
    overflow-y: auto;
    padding: 22px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--card-bg);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    cursor: pointer;
    opacity: var(--op, 1);
    /* Distance-scaled offset is large enough relative to card width that
       neighbor cards expose a real, tappable edge instead of hiding
       entirely behind the (same-size, opaque) front card. */
    transform: translate(-50%, -50%) translateX(calc(var(--dx, 0) * 1px)) rotate(calc(var(--rot, 0) * 1deg)) scale(var(--sc, 1));
    transition: transform 0.32s cubic-bezier(0.2, 0.7, 0.3, 1), opacity 0.32s ease;
  }
  .rcard.front { cursor: default; }
  .rcard h2 { font-family: "Space Grotesk", sans-serif; font-size: 19px; line-height: 1.25; margin-bottom: 4px; }
  .rcard .sub { font-size: 13px; color: var(--dim); margin-bottom: 12px; }
  .rcard .why { font-size: 13.5px; line-height: 1.55; margin: 10px 0; }
  .rcard .score-row { display: flex; gap: 14px; font-size: 12px; color: var(--dim); margin-bottom: 6px; }
  .rcard .score-row b { color: var(--ink); font-size: 15px; }
  .rcard h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--dim); margin-top: 14px; }
  .rcard .apply {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--accent);
    color: var(--accent);
    text-decoration: none;
    font-family: "Space Grotesk", sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .rcard .apply:hover { background: var(--hover-bg); }
  .rolodex-close {
    position: absolute;
    top: -42px;
    right: 0;
    background: none;
    border: none;
    color: var(--ink);
    font-size: 22px;
    cursor: pointer;
  }
  .rolodex-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: var(--card-bg);
    border: 1px solid var(--line);
    color: var(--ink);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    z-index: 15;
  }
  .rolodex-nav:hover { border-color: var(--accent); color: var(--accent); }
  .rolodex-nav.prev { left: -6px; }
  .rolodex-nav.next { right: -6px; }

  /* ---------- graph (living dependency graph): landing view ----------
     Position is deterministic, never physics — every node gets a fixed
     angle by entity type (job/skill/gap/sector); selecting a node changes
     only its neighbors' radius (graph-hop distance) and opacity, so motion
     always reads as "pulling relevant things closer," never as randomness.
     One relayout transition per click (~500ms), then fully idle — no
     simulation runs at rest, matching [[site-performance-rules]]. Only the
     inspector panel uses backdrop-filter; the (up to ~80) node chips stay
     flat, so blur-layer count never scales with the job pool size. */
  /* :not([hidden]) — an unscoped `#graphView { display:flex }` would beat
     the `hidden` attribute's UA-stylesheet `display:none` on specificity
     alone, leaving the graph visibly rendered on top of Matrix/Ledger. */
  #graphView:not([hidden]) { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .g-top { display: flex; align-items: center; gap: 12px; padding: 2px 0 10px; font-size: 12px; color: var(--dim); }
  .g-top b { color: var(--ink); font-weight: 600; }
  .g-top .g-type-tag { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(201, 168, 106, 0.4); border-radius: 4px; padding: 2px 6px; }
  .g-overview-btn {
    background: none; border: 1px solid var(--line); color: var(--dim); border-radius: 999px;
    padding: 5px 13px; font: 10.5px "Space Grotesk", sans-serif; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; margin-left: auto;
  }
  .g-overview-btn:hover { border-color: var(--accent); color: var(--accent); }

  .graph-stage { position: relative; flex: 1; min-height: 0; display: flex; }
  .g-canvas {
    position: relative; flex: 1; min-width: 0; overflow: hidden; border-radius: 10px;
    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px; background-position: center;
  }
  .g-fade { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 50%, transparent 42%, var(--bg) 88%); }
  .g-track { position: absolute; left: 50%; top: 50%; width: 0; height: 0; }
  svg.g-edges { position: absolute; left: 50%; top: 50%; overflow: visible; pointer-events: none; }
  svg.g-edges line { transition: stroke-opacity 0.45s ease, stroke-width 0.45s ease, stroke 0.3s ease; }

  .gnode {
    position: absolute; left: 50%; top: 50%; transform-origin: center; max-width: 150px;
    transition: transform 0.5s cubic-bezier(0.22, 0.68, 0.32, 1), opacity 0.4s ease;
    display: flex; flex-direction: column; align-items: flex-start; overflow: hidden;
    background: var(--card-bg); border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 10px 6px 9px; cursor: pointer; white-space: nowrap; user-select: none;
  }
  .gnode .gtag { font-size: 7.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); opacity: 0.75; margin-bottom: 1px; }
  /* min-width:0 lets ellipsis actually engage on a flex-column child —
     without it a nowrap span refuses to shrink below its own content width. */
  .gnode .glbl { font-family: "Space Grotesk", sans-serif; font-size: 11.5px; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; min-width: 0; max-width: 100%; }
  .gnode .gsub { font-size: 9.5px; color: var(--dim); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; min-width: 0; max-width: 100%; }
  .gnode.skill { border-left: 3px solid var(--cat, var(--line)); padding-left: 8px; }
  .gnode.gap { border-style: dashed; }
  .gnode:hover { border-color: var(--accent); z-index: 20; }
  .gnode.tiny { padding: 0; width: 9px; height: 9px; min-width: 0; border-radius: 50%; background: var(--dim); border: none; }
  .gnode.tiny .glbl, .gnode.tiny .gtag, .gnode.tiny .gsub { display: none; }
  .gnode.tiny:hover { width: auto; height: auto; padding: 6px 10px; border-radius: 6px; background: var(--card-bg); border: 1px solid var(--accent); }
  .gnode.tiny:hover .glbl { display: block; }
  .gnode.focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 22px rgba(201, 168, 106, 0.18); cursor: default; z-index: 30; }
  .gnode.focus .glbl { font-size: 14px; font-weight: 600; }

  aside.g-inspector {
    width: min(280px, 32vw); flex-shrink: 0; border-left: 1px solid var(--line); padding: 16px;
    overflow-y: auto; background: rgba(20, 22, 27, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    display: flex; flex-direction: column; gap: 12px;
  }
  aside.g-inspector .g-itype { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  aside.g-inspector h2 { font-family: "Space Grotesk", sans-serif; font-size: 17px; line-height: 1.28; }
  aside.g-inspector .g-isub { font-size: 11.5px; color: var(--dim); }
  aside.g-inspector .g-why { font-size: 12.5px; line-height: 1.55; border-top: 1px solid var(--line); padding-top: 10px; }
  aside.g-inspector .g-score-row { display: flex; gap: 12px; font-size: 11px; color: var(--dim); }
  aside.g-inspector .g-score-row b { color: var(--ink); font-size: 13.5px; }
  .g-rel-group h3 { font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
  .g-rel-item {
    display: flex; align-items: center; gap: 8px; font: 12px "Inter", sans-serif; padding: 5px 0;
    border-bottom: 1px solid rgba(232, 234, 237, 0.06); cursor: pointer; color: var(--ink);
    background: none; border-left: none; border-right: none; border-top: none; width: 100%; text-align: left;
  }
  .g-rel-item:hover, .g-rel-item:focus-visible { color: var(--accent); outline: none; }
  .g-rel-item .gw { margin-left: auto; font: 11px "Space Grotesk", sans-serif; color: var(--dim); font-variant-numeric: tabular-nums; }
  .g-apply {
    display: inline-block; margin-top: 2px; padding: 8px 16px; border-radius: 999px; border: 1px solid var(--accent);
    color: var(--accent); text-decoration: none; font-family: "Space Grotesk", sans-serif; font-size: 11.5px;
    letter-spacing: 0.07em; text-transform: uppercase; align-self: flex-start;
  }
  .g-apply:hover { background: var(--hover-bg); }
  .g-empty { color: var(--dim); font-size: 12.5px; line-height: 1.6; }

  @media (max-width: 760px) {
    .graph-stage { flex-direction: column; }
    aside.g-inspector { width: 100%; max-height: 36%; border-left: none; border-top: 1px solid var(--line); order: 2; }
    .g-canvas { order: 1; }
    /* Chip footprint is fixed CSS pixels but the available radius shrinks
       with the viewport (graphMaxR) — without this, home-state labels
       (sized for desktop) crowd each other on a narrow screen even though
       the underlying angle/radius math is already scaling down correctly. */
    .gnode { max-width: 108px; padding: 4px 7px 4px 6px; }
    .gnode .glbl { font-size: 10px; }
    .gnode .gsub { font-size: 8.5px; }
  }
  @media (pointer: coarse) { aside.g-inspector { backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px); } }

  /* ---------- legend (interactive category filter) + footer ---------- */
  .legend {
    position: relative;
    z-index: 5;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 10px;
    justify-content: center;
    align-items: center;
    padding: 10px clamp(12px, 3vw, 40px) 16px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
  }
  .legend .key {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 4px 10px;
    color: var(--dim);
    font: inherit;
    letter-spacing: inherit;
    cursor: pointer;
  }
  .legend .key:hover { border-color: var(--line); }
  .legend .key:focus-visible { outline: 1px solid var(--accent); outline-offset: -1px; }
  .legend .key.off { opacity: 0.35; }
  .legend .key.off .swatch { background: none !important; border: 1.5px solid var(--dim); }
  .legend .swatch { width: 10px; height: 10px; border-radius: 50%; }
  .legend .swatch.ghost { background: none; border: 1.5px dashed var(--dim); }
  .legend .meta-note { flex-basis: 100%; text-align: center; opacity: 0.75; }

  @media (max-width: 700px) {
    .hud-title { display: none; }
    .lrow { grid-template-columns: 74px 1fr; }
    .lscore { font-size: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01s !important; }
  }
</style>
</head>
<body>
  <canvas id="field"></canvas>

  <header class="hud">
    <a class="brand" href="index.html" aria-label="Back to home">ML</a>
    <span class="hud-title normal-only">Skills · Market Alignment</span>
    <span class="hud-title kate-only">Things Michael Pretends To Know</span>
  </header>

  <button id="kateToggle" class="kate-toggle-btn" aria-label="Toggle Kate mode">
    <span class="normal-only">Kate mode</span>
    <span class="kate-only">Standard mode</span>
  </button>

  <main class="stage">
    <div class="controls">
      <div class="seg" role="tablist" aria-label="View">
        <button id="viewGraph" role="tab">Graph</button>
        <button id="viewMatrix" role="tab">Matrix</button>
        <button id="viewLedger" role="tab">Ledger</button>
      </div>
      <label class="ctl" id="jobSortCtl">Jobs
        <select id="jobSort" aria-label="Sort jobs">
          <option value="match">By match</option>
          <option value="title">Position A–Z</option>
          <option value="company">Company A–Z</option>
        </select>
      </label>
      <label class="ctl" id="skillSortCtl">Skills
        <select id="skillSort" aria-label="Sort skill columns">
          <option value="demand">By demand</option>
          <option value="alpha">A–Z</option>
        </select>
      </label>
    </div>

    <div class="views" id="views">
      <div id="graphView" hidden></div>
      <div id="matrixView" hidden></div>
      <div id="ledgerView" hidden></div>
    </div>
  </main>

  <div class="rolodex" id="rolodex" aria-hidden="true">
    <div class="rolodex-stack" id="rolodexStack">
      <div id="rolodexCards"></div>
      <button class="rolodex-close" id="rolodexClose" aria-label="Close details">✕</button>
      <button class="rolodex-nav prev" id="rolodexPrev" aria-label="Previous job">‹</button>
      <button class="rolodex-nav next" id="rolodexNext" aria-label="Next job">›</button>
    </div>
  </div>

  <footer class="legend" id="legend">
    <button class="key" data-cat="analytics"><span class="swatch" style="background:var(--cat-analytics)"></span>Analytics</button>
    <button class="key" data-cat="engineering"><span class="swatch" style="background:var(--cat-engineering)"></span>Engineering</button>
    <button class="key" data-cat="tools"><span class="swatch" style="background:var(--cat-tools)"></span>Tools</button>
    <button class="key" data-cat="domain"><span class="swatch" style="background:var(--cat-domain)"></span>Domain</button>
    <button class="key" data-cat="gap"><span class="swatch ghost"></span>Skill gap</button>
    <span class="meta-note" id="metaNote">Select any node to see how it connects to the rest of your profile</span>
  </footer>

<script>
  /* ---------- Kate mode (shared localStorage key with the other pages) ---------- */
  const isKateMode = localStorage.getItem('kateMode') === 'true';
  if (isKateMode) document.body.classList.add('kate-mode');
  document.getElementById('kateToggle').addEventListener('click', () => {
    const active = document.body.classList.toggle('kate-mode');
    localStorage.setItem('kateMode', active ? 'true' : 'false');
    drawField();
  });

  /* ---------- backdrop: hyperbolic geodesic grid (same as index.html) ----------
     Static — drawn once, redrawn only on resize or theme toggle. */
  const fCanvas = document.getElementById('field');
  const fCtx = fCanvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function drawField() {
    const w = fCanvas.width = innerWidth * DPR;
    const h = fCanvas.height = innerHeight * DPR;
    fCanvas.style.width = innerWidth + 'px';
    fCanvas.style.height = innerHeight + 'px';
    fCtx.clearRect(0, 0, w, h);

    const kate = document.body.classList.contains('kate-mode');
    const rgb = kate ? '242, 165, 184' : '201, 168, 106';
    const cx = w / 2, cy = h * 0.55;
    const R = Math.hypot(w, h) * 0.42;
    fCtx.lineWidth = 1 * DPR;

    fCtx.save();
    fCtx.beginPath();
    fCtx.arc(cx, cy, R, 0, Math.PI * 2);
    fCtx.clip();
    const RINGS = 9;
    for (let i = 1; i <= RINGS; i++) {
      const r = R * Math.tanh(i * 0.30) / Math.tanh(RINGS * 0.30);
      fCtx.strokeStyle = `rgba(${rgb}, ${(0.04 + 0.03 * i / RINGS).toFixed(3)})`;
      fCtx.beginPath();
      fCtx.arc(cx, cy, r, 0, Math.PI * 2);
      fCtx.stroke();
    }
    fCtx.strokeStyle = `rgba(${rgb}, 0.05)`;
    const SPOKES = 11;
    for (let k = 0; k < SPOKES; k++) {
      const th = (k / SPOKES) * Math.PI * 2;
      for (const m of [1.06, 1.35, 1.9]) {
        const d = R * m;
        const r = Math.sqrt(d * d - R * R);
        fCtx.beginPath();
        fCtx.arc(cx + Math.cos(th) * d, cy + Math.sin(th) * d, r, 0, Math.PI * 2);
        fCtx.stroke();
      }
    }
    fCtx.restore();
    fCtx.strokeStyle = `rgba(${rgb}, 0.1)`;
    fCtx.beginPath();
    fCtx.arc(cx, cy, R, 0, Math.PI * 2);
    fCtx.stroke();
  }
  drawField();
  let resizeTimer;
  addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(drawField, 200);
  });

  /* ---------- data: live from the agent-data branch, sample fallback ---------- */
  const DATA_URL = 'https://raw.githubusercontent.com/agentchieflou/agentchieflou.github.io/agent-data/skills_graph.json';
  const SAMPLE = {
    sample: true,
    skills: [
      { id: 'data analysis', name: 'Data Analysis', category: 'analytics', strength: 0.9 },
      { id: 'business intelligence', name: 'Business Intelligence', category: 'analytics', strength: 0.85 },
      { id: 'sql', name: 'SQL', category: 'engineering', strength: 0.9 },
      { id: 'python', name: 'Python', category: 'engineering', strength: 0.8 },
      { id: 'tableau', name: 'Tableau', category: 'tools', strength: 0.8 },
      { id: 'banking', name: 'Banking', category: 'domain', strength: 0.8 }
    ],
    ghost_skills: [
      { id: 'ghost-dbt', name: 'dbt', ghost: true }
    ],
    jobs: [
      { id: 'j1', title: 'Senior Business Analyst', company: 'Sample Co', location: 'Remote (US)',
        url: '#', source: 'sample', score: 84, confidence: 0.8,
        why: 'Sample match — strong overlap with BI tooling and banking analytics experience.' },
      { id: 'j2', title: 'Analytics Consultant', company: 'Example Corp', location: 'Remote',
        url: '#', source: 'sample', score: 78, confidence: 0.7,
        why: 'Sample match — consulting background plus dashboarding skills fit the role.' }
    ],
    edges: [
      { skill: 'business intelligence', job: 'j1', weight: 1, missing: false },
      { skill: 'sql', job: 'j1', weight: 0.9, missing: false },
      { skill: 'tableau', job: 'j1', weight: 0.8, missing: false },
      { skill: 'banking', job: 'j1', weight: 0.7, missing: false },
      { skill: 'ghost-dbt', job: 'j1', weight: 0.5, missing: true },
      { skill: 'data analysis', job: 'j2', weight: 1, missing: false },
      { skill: 'python', job: 'j2', weight: 0.85, missing: false },
      { skill: 'sql', job: 'j2', weight: 0.6, missing: false }
    ]
  };

  const CAT_COLORS = {
    analytics: 'var(--cat-analytics)',
    engineering: 'var(--cat-engineering)',
    tools: 'var(--cat-tools)',
    domain: 'var(--cat-domain)'
  };

  // Legacy skills removed from the pipeline (agent/config.py blocklist) —
  // filtered here too so stale agent-data snapshots never show them.
  const SKILL_BLOCKLIST = /\b(SAS|Stata|BERT|NLP)\b/i;
  function stripBlocked(data) {
    const drop = new Set(
      [...(data.skills || []), ...(data.ghost_skills || [])]
        .filter(s => SKILL_BLOCKLIST.test(s.name || '')).map(s => s.id));
    if (!drop.size) return data;
    return Object.assign({}, data, {
      skills: (data.skills || []).filter(s => !drop.has(s.id)),
      ghost_skills: (data.ghost_skills || []).filter(s => !drop.has(s.id)),
      edges: (data.edges || []).filter(e => !drop.has(e.skill))
    });
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, m =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }

  /* ---------- view state ---------- */
  let DATA = null;
  let view = localStorage.getItem('skillsView');
  if (view !== 'matrix' && view !== 'ledger' && view !== 'graph') view = 'graph';
  let jobSort = 'match';
  let skillSort = 'demand';
  const catOff = new Set();   // deselected legend categories ('analytics', ..., 'gap')

  function sortedJobs() {
    const jobs = [...DATA.jobs];
    if (jobSort === 'title') jobs.sort((a, b) => a.title.localeCompare(b.title));
    else if (jobSort === 'company') jobs.sort((a, b) => a.company.localeCompare(b.company));
    else jobs.sort((a, b) => b.score - a.score);
    return jobs;
  }

  function visibleSkills(demand) {
    let skills = DATA.skills.filter(s => !catOff.has(s.category));
    if (skillSort === 'alpha') skills.sort((a, b) => a.name.localeCompare(b.name));
    else skills.sort((a, b) => (demand[b.id] || 0) - (demand[a.id] || 0) || b.strength - a.strength);
    if (!catOff.has('gap')) skills = skills.concat(DATA.ghost_skills || []);
    return skills;
  }

  function jobEdges(jobId) {
    return DATA.edges.filter(e => e.job === jobId).sort((a, b) => b.weight - a.weight);
  }

  /* ---------- Demand matrix (landing view) ---------- */
  function renderMatrix() {
    const demand = {};
    DATA.edges.forEach(e => { if (!e.missing) demand[e.skill] = (demand[e.skill] || 0) + 1; });
    const skills = visibleSkills(demand);
    const jobs = sortedJobs();
    if (!jobs.length) {
      document.getElementById('matrixView').innerHTML = '<p class="empty-note">No live matches yet — the agent’s next run fills this in.</p>';
      return;
    }

    const head = skills.map(s => `<th class="skill-h"><span>${s.ghost
      ? esc(s.name) + ' · gap'
      : `<span class="cdot" style="background:${CAT_COLORS[s.category]}"></span>` + esc(s.name)}</span></th>`).join('');

    const rows = jobs.map(j => {
      const w = {};
      jobEdges(j.id).forEach(e => { w[e.skill] = e; });
      const cells = skills.map(s => {
        const e = w[s.id];
        if (!e) return '<td class="cell"></td>';
        if (e.missing) return `<td class="cell gap" title="${esc(s.name)} — required, not in profile"></td>`;
        return `<td class="cell" title="${esc(s.name)} · centrality ${Math.round(e.weight * 100)}%"
          style="background:color-mix(in srgb, ${CAT_COLORS[s.category]} ${Math.round(15 + 75 * e.weight)}%, transparent)"></td>`;
      }).join('');
      return `<tr><th class="job"><button data-job="${esc(j.id)}">${esc(j.title)}</button>
        <small>${esc(j.company)}</small></th>${cells}<td class="score">${esc(j.score)}</td></tr>`;
    }).join('');

    const foot = skills.map(s => `<td>${demand[s.id] || ''}</td>`).join('');
    document.getElementById('matrixView').innerHTML = `<table class="matrix">
      <thead><tr><th></th>${head}<th class="skill-h"><span>Match</span></th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><th>demand →</th>${foot}<td></td></tr></tfoot>
    </table>`;
  }

  /* ---------- Match ledger (secondary view) ---------- */
  function renderLedger() {
    const jobs = sortedJobs();
    if (!jobs.length) {
      document.getElementById('ledgerView').innerHTML = '<p class="empty-note">No live matches yet — the agent’s next run fills this in.</p>';
      return;
    }
    const skillById = {};
    DATA.skills.forEach(s => { skillById[s.id] = s; });
    (DATA.ghost_skills || []).forEach(g => { skillById[g.id] = g; });

    document.getElementById('ledgerView').innerHTML = '<div class="ledger">' + jobs.map(j => {
      const chips = jobEdges(j.id).map(e => {
        const s = skillById[e.skill];
        if (!s) return '';
        if (e.missing || s.ghost) {
          return catOff.has('gap') ? '' : `<span class="chip missing">${esc(s.name)} · gap</span>`;
        }
        if (catOff.has(s.category)) return '';
        return `<span class="chip"><span class="dot" style="background:${CAT_COLORS[s.category]}"></span>${esc(s.name)}</span>`;
      }).join('');
      const meta = [j.company, j.location, j.salary, 'via ' + j.source].filter(Boolean).map(esc).join(' · ');
      const title = j.url && j.url !== '#'
        ? `<a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)} ↗</a>` : esc(j.title);
      return `<div class="lrow">
        <div class="lscore">${esc(j.score)}<small>match</small></div>
        <div><div class="ltitle">${title}</div><div class="lmeta">${meta}</div></div>
        <div class="lmeter"><i style="width:${Math.max(0, Math.min(100, j.score))}%"></i></div>
        ${j.why ? `<div class="lwhy">${esc(j.why)}</div>` : ''}
        ${chips ? `<div class="lchips">${chips}</div>` : ''}
      </div>`;
    }).join('') + '</div>';
  }

  /* ---------- rolodex (from matrix row clicks) ----------
     Clicking a job opens a fanned card stack: the clicked job's card comes
     to front, the rest of the currently-sorted job list recedes behind it
     (grey/scaled/rotated via CSS vars). Only front ± 2 neighbor cards are
     ever rendered — cheap DOM regardless of how many jobs are visible. */
  const rolodexEl = document.getElementById('rolodex');
  const rolodexCards = document.getElementById('rolodexCards');
  const rolodexPrevBtn = document.getElementById('rolodexPrev');
  const rolodexNextBtn = document.getElementById('rolodexNext');
  let rolodexJobs = [];
  let rolodexFront = 0;

  function openRolodex(jobId) {
    rolodexJobs = sortedJobs();
    const idx = rolodexJobs.findIndex(j => j.id === jobId);
    rolodexFront = idx >= 0 ? idx : 0;
    rolodexEl.classList.add('open');
    rolodexEl.setAttribute('aria-hidden', 'false');
    renderRolodex();
  }

  function closeRolodex() {
    rolodexEl.classList.remove('open');
    rolodexEl.setAttribute('aria-hidden', 'true');
  }

  function rolodexCardHtml(job, dist) {
    const skillById = {};
    DATA.skills.forEach(s => { skillById[s.id] = s; });
    (DATA.ghost_skills || []).forEach(g => { skillById[g.id] = g; });
    const matched = [], missing = [];
    jobEdges(job.id).forEach(e => {
      const s = skillById[e.skill];
      if (s) (e.missing || s.ghost ? missing : matched).push(s);
    });
    const sc = Math.max(0.72, 1 - Math.abs(dist) * 0.1);
    const op = Math.max(0, 1 - Math.abs(dist) * 0.4);
    // Step scales with viewport so a neighbor card's center always clears the
    // front card's footprint (real tap target, not just a peeking corner),
    // while still fitting comfortably on a narrow phone screen.
    const step = Math.min(190, Math.round(innerWidth * 0.42));
    return `<div class="rcard${dist === 0 ? ' front' : ''}" data-dist="${dist}"
        style="--dx:${dist * step};--rot:${dist * 9};--sc:${sc.toFixed(3)};--op:${op.toFixed(3)};z-index:${10 - Math.abs(dist)}">
      <h2>${esc(job.title)}</h2>
      <div class="sub">${esc(job.company)} · ${esc(job.location)}${job.salary ? ' · ' + esc(job.salary) : ''}</div>
      <div class="score-row"><span>Match <b>${esc(job.score)}</b>/100</span>
        <span>Confidence <b>${Math.round((job.confidence || 0) * 100)}%</b></span></div>
      <div class="why">${esc(job.why || '')}</div>
      ${matched.length ? `<h3>Matching skills</h3><div class="chips">${matched.map(s =>
        `<span class="chip"><span class="dot" style="background:${CAT_COLORS[s.category] || 'var(--accent)'}"></span>${esc(s.name)}</span>`).join('')}</div>` : ''}
      ${missing.length ? `<h3>Skill gaps</h3><div class="chips">${missing.map(s =>
        `<span class="chip missing">${esc(s.name)}</span>`).join('')}</div>` : ''}
      ${job.url && job.url !== '#' ? `<a class="apply" href="${esc(job.url)}" target="_blank" rel="noopener">View &amp; apply ↗</a>` : ''}
      <p style="font-size:11px;color:var(--dim);margin-top:12px;">Found via ${esc(job.source)} — applying is always your call; nothing is submitted automatically.</p>
    </div>`;
  }

  function renderRolodex() {
    const n = rolodexJobs.length;
    if (!n) return;
    const w = Math.min(2, Math.floor((n - 1) / 2));
    let html = '';
    for (let d = -w; d <= w; d++) {
      const idx = ((rolodexFront + d) % n + n) % n;
      html += rolodexCardHtml(rolodexJobs[idx], d);
    }
    rolodexCards.innerHTML = html;
    rolodexPrevBtn.style.display = n > 1 ? '' : 'none';
    rolodexNextBtn.style.display = n > 1 ? '' : 'none';
  }

  function rolodexStep(delta) {
    const n = rolodexJobs.length;
    if (!n) return;
    rolodexFront = ((rolodexFront + delta) % n + n) % n;
    renderRolodex();
  }

  rolodexCards.addEventListener('click', e => {
    const card = e.target.closest('.rcard');
    if (!card || card.classList.contains('front')) return;
    rolodexStep(parseInt(card.dataset.dist, 10));
  });
  rolodexPrevBtn.addEventListener('click', () => rolodexStep(-1));
  rolodexNextBtn.addEventListener('click', () => rolodexStep(1));
  document.getElementById('rolodexClose').addEventListener('click', closeRolodex);
  rolodexEl.addEventListener('click', e => { if (e.target === rolodexEl) closeRolodex(); });
  document.addEventListener('keydown', e => {
    if (!rolodexEl.classList.contains('open')) return;
    if (e.key === 'Escape') closeRolodex();
    else if (e.key === 'ArrowLeft') rolodexStep(-1);
    else if (e.key === 'ArrowRight') rolodexStep(1);
  });

  let rolodexTouchX = null;
  const rolodexStackEl = document.getElementById('rolodexStack');
  rolodexStackEl.addEventListener('touchstart', e => { rolodexTouchX = e.touches[0].clientX; }, { passive: true });
  rolodexStackEl.addEventListener('touchend', e => {
    if (rolodexTouchX === null) return;
    const dx = e.changedTouches[0].clientX - rolodexTouchX;
    if (Math.abs(dx) > 40) rolodexStep(dx < 0 ? 1 : -1);
    rolodexTouchX = null;
  }, { passive: true });

  document.getElementById('matrixView').addEventListener('click', e => {
    const btn = e.target.closest('button[data-job]');
    if (!btn || !DATA) return;
    openRolodex(btn.dataset.job);
  });

  /* ---------- Graph (landing view): living dependency graph ----------
     Real data only: skill<->job edges from DATA.edges, plus an implicit
     job<->sector edge per job's `sector` field (from agent/score_llm.py's
     classification). No fabricated project/repo/employer nodes — those
     would need their own real data source in the agent pipeline first,
     not placeholder content shipped to the live site. */
  const SECTOR_PREFIX = 'sector-';
  const GTYPE_LABEL = { job: 'Open role', skill: 'Skill', gap: 'Skill gap', sector: 'Sector' };
  const G_TYPE_ORDER = ['job', 'skill', 'gap', 'sector'];
  const G_HOME_R = { job: 130, skill: 250, gap: 250, sector: 320 };
  const G_TIER_R = [0, 150, 240, 330];
  const G_GAP_DEG = 8;

  let graphFocus = null;
  let graphNodes = [];
  let graphAngle = {};
  let graphEdgeList = [];   // [aId, bId, weight]
  let graphScale = 1;

  function buildGraphData() {
    const demand = {};
    DATA.edges.forEach(e => { if (!e.missing) demand[e.skill] = (demand[e.skill] || 0) + 1; });
    const skills = visibleSkills(demand);
    const jobs = sortedJobs();

    const nodes = [];
    const bySector = {};
    jobs.forEach(j => {
      nodes.push({ id: j.id, type: 'job', label: j.title, sub: j.company, job: j });
      if (j.sector) (bySector[j.sector] = bySector[j.sector] || []).push(j.id);
    });
    skills.forEach(s => {
      nodes.push({ id: s.id, type: s.ghost ? 'gap' : 'skill', label: s.name, cat: s.category });
    });
    Object.keys(bySector).forEach(sec => {
      nodes.push({ id: SECTOR_PREFIX + sec.replace(/\W+/g, '_'), type: 'sector', label: sec, jobIds: bySector[sec] });
    });

    const nodeIds = new Set(nodes.map(n => n.id));
    const edges = [];
    DATA.edges.forEach(e => {
      if (nodeIds.has(e.skill) && nodeIds.has(e.job)) edges.push([e.skill, e.job, e.weight]);
    });
    Object.entries(bySector).forEach(([sec, ids]) => {
      const sid = SECTOR_PREFIX + sec.replace(/\W+/g, '_');
      ids.forEach(jid => edges.push([sid, jid, 0.6]));
    });
    return { nodes, edges };
  }

  function assignGraphAngles(nodes) {
    const angleOf = {};
    const groups = G_TYPE_ORDER.map(t => nodes.filter(n => n.type === t).sort((a, b) => a.label.localeCompare(b.label)));
    const activeGroups = groups.filter(g => g.length);
    const totalGap = G_GAP_DEG * activeGroups.length;
    // sqrt-weighted, not count-weighted: with e.g. 8 jobs vs 16 skills, a
    // straight proportional split gives jobs a sliver too narrow for their
    // chip width once several share a tier during a focus. sqrt compresses
    // that disparity while still giving bigger groups more room overall.
    const weight = g => Math.sqrt(g.length);
    const totalWeight = activeGroups.reduce((sum, g) => sum + weight(g), 0) || 1;
    let cursor = -90;
    groups.forEach(g => {
      if (!g.length) return;
      const span = (360 - totalGap) * (weight(g) / totalWeight);
      g.forEach((n, i) => { angleOf[n.id] = cursor + (g.length === 1 ? span / 2 : (span * i) / (g.length - 1)); });
      cursor += span + G_GAP_DEG;
    });
    return angleOf;
  }

  function graphHopDistances(focusId) {
    const dist = { [focusId]: 0 };
    const q = [focusId];
    while (q.length) {
      const cur = q.shift();
      for (const [a, b] of graphEdgeList) {
        const nb = a === cur ? b : (b === cur ? a : null);
        if (nb && !(nb in dist)) { dist[nb] = dist[cur] + 1; q.push(nb); }
      }
    }
    return dist;
  }

  function graphNeighbors(id) {
    return graphEdgeList.filter(e => e[0] === id || e[1] === id)
      .map(e => ({ id: e[0] === id ? e[1] : e[0], w: e[2] })).sort((a, b) => b.w - a.w);
  }

  let graphMaxR = 999;
  function computeGraphScale() {
    const wrap = document.getElementById('gCanvas');
    if (!wrap) return;
    const w = wrap.clientWidth, h = wrap.clientHeight;
    graphScale = Math.max(0.5, Math.min(1, Math.min(w, h) / 640));
    // Hard clamp so no node (including its stagger offset) can land past the
    // canvas edge regardless of how many siblings pile into one bucket —
    // .g-canvas clips overflow, so an unclamped radius just vanishes off-frame.
    graphMaxR = Math.min(w, h) / 2 - 90;
  }

  function graphRadius(type, dist) {
    const base = graphFocus === null
      ? G_HOME_R[type]
      : (dist === undefined || dist === Infinity ? G_TIER_R[3] : G_TIER_R[Math.min(dist, 3)]);
    return Math.min(base * graphScale, graphMaxR);
  }

  function renderGraph() {
    const jobs = sortedJobs();
    if (!jobs.length) {
      document.getElementById('graphView').innerHTML = '<p class="empty-note">No live matches yet — the agent’s next run fills this in.</p>';
      return;
    }
    if (!document.getElementById('gCanvas')) {
      document.getElementById('graphView').innerHTML = `
        <div class="g-top"><span id="gBreadcrumb"></span><button class="g-overview-btn" id="gOverviewBtn">◎ Overview</button></div>
        <div class="graph-stage">
          <div class="g-canvas" id="gCanvas">
            <div class="g-fade"></div>
            <div class="g-track"><svg class="g-edges" id="gEdges"></svg></div>
          </div>
          <aside class="g-inspector" id="gInspector"></aside>
        </div>`;
      document.getElementById('gOverviewBtn').addEventListener('click', () => setGraphFocus(null));
    }
    const { nodes, edges } = buildGraphData();
    graphNodes = nodes;
    graphEdgeList = edges;
    graphAngle = assignGraphAngles(nodes);
    if (graphFocus && !nodes.some(n => n.id === graphFocus)) graphFocus = null;
    layoutGraph();
  }

  // Outward-only, cycling lanes. Node box sizes vary wildly here (a 9px job
  // dot vs. a ~150x50px skill chip), so an inward stagger step — even a
  // "small" one — can drop a chunky chip's radius close enough to an inner
  // ring that its bounding box swallows a node sitting on that ring; a
  // symmetric +/- fan can't guarantee otherwise without knowing every box's
  // footprint. Only ever pushing siblings further out is simpler and safe:
  // it can never encroach on a smaller inner ring, only spread into the
  // open field beyond its own ring. Same-lane siblings (every 4th in
  // angle-sorted order) are already angularly far apart.
  const STAGGER_LANES = [0, 1, 2, 3];
  function staggerStep(i) {
    return STAGGER_LANES[i % STAGGER_LANES.length];
  }

  function layoutGraph() {
    computeGraphScale();
    const byId = {};
    graphNodes.forEach(n => { byId[n.id] = n; });
    const dist = graphFocus ? graphHopDistances(graphFocus) : {};

    // First pass: base geometry + which bucket (same type, same radius) each
    // labeled node falls into, so siblings that would otherwise land right
    // on top of each other (e.g. several jobs sharing a skill's tier-1 ring)
    // get staggered onto slightly different radii instead of colliding.
    const info = graphNodes.map(n => {
      const isFocus = n.id === graphFocus;
      const d = dist[n.id];
      const tiny = !isFocus && n.type === 'job' && (graphFocus === null || d === undefined || d > 1);
      return { n, isFocus, d, tiny, baseR: isFocus ? 0 : graphRadius(n.type, d) };
    });
    const buckets = {};
    info.forEach(it => {
      if (it.isFocus || it.tiny) return;
      const key = it.n.type + '|' + it.baseR.toFixed(1);
      (buckets[key] = buckets[key] || []).push(it);
    });
    Object.values(buckets).forEach(group => {
      if (group.length < 2) return;
      group.sort((a, b) => graphAngle[a.n.id] - graphAngle[b.n.id]);
      const step = 54 * graphScale;
      group.forEach((it, i) => { it.staggerR = it.baseR + staggerStep(i) * step; });
    });

    const finalR = {};
    info.forEach(it => {
      const r = it.staggerR !== undefined ? it.staggerR : it.baseR;
      finalR[it.n.id] = it.isFocus ? 0 : Math.max(0, Math.min(r, graphMaxR));
    });

    let html = '';
    info.forEach(({ n, isFocus, d, tiny }) => {
      const r = finalR[n.id];
      const ang = (graphAngle[n.id] * Math.PI) / 180;
      const x = Math.cos(ang) * r, y = Math.sin(ang) * r;
      const op = isFocus ? 1 : (graphFocus === null ? (n.type === 'job' ? 0.55 : 0.92)
        : (d === undefined ? 0.12 : Math.max(0.4, 1 - (d - 1) * 0.24)));
      const catStyle = n.type === 'skill' && n.cat ? `--cat:${CAT_COLORS[n.cat]};` : '';
      html += `<div class="gnode ${n.type}${isFocus ? ' focus' : ''}${tiny ? ' tiny' : ''}" data-id="${esc(n.id)}"
        style="transform:translate(-50%,-50%) translate(${x}px,${y}px);opacity:${op};${catStyle}">
        <span class="gtag">${GTYPE_LABEL[n.type]}</span>
        <span class="glbl">${esc(n.label)}</span>
        ${n.sub && !tiny ? `<span class="gsub">${esc(n.sub)}</span>` : ''}
      </div>`;
    });
    const track = document.querySelector('#graphView .g-track');
    track.querySelectorAll('.gnode').forEach(el => el.remove());
    track.insertAdjacentHTML('beforeend', html);
    track.querySelectorAll('.gnode').forEach(el =>
      el.addEventListener('click', () => setGraphFocus(el.dataset.id === graphFocus ? null : el.dataset.id)));

    let edgeHtml = '';
    graphEdgeList.forEach(([a, b, w]) => {
      const na = byId[a], nb = byId[b];
      if (!na || !nb) return;
      const da = dist[a], db = dist[b];
      const ra = finalR[a], rb = finalR[b];
      const aa = (graphAngle[a] * Math.PI) / 180, ab = (graphAngle[b] * Math.PI) / 180;
      const x1 = Math.cos(aa) * ra, y1 = Math.sin(aa) * ra, x2 = Math.cos(ab) * rb, y2 = Math.sin(ab) * rb;
      let opacity, width, stroke;
      if (graphFocus === null) { opacity = 0.07; width = 1; stroke = 'var(--line)'; }
      else {
        const touchesFocus = a === graphFocus || b === graphFocus;
        const bothClose = da !== undefined && da <= 2 && db !== undefined && db <= 2;
        if (touchesFocus) { opacity = 0.32 + w * 0.55; width = 1 + w * 2; stroke = 'var(--accent)'; }
        else if (bothClose) { opacity = 0.16 + w * 0.28; width = 1; stroke = 'var(--dim)'; }
        else { opacity = 0.03; width = 1; stroke = 'var(--line)'; }
      }
      edgeHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${width}" stroke-opacity="${opacity}" />`;
    });
    document.getElementById('gEdges').innerHTML = edgeHtml;

    renderGraphInspector(byId);
    renderGraphBreadcrumb(byId);
  }

  function renderGraphBreadcrumb(byId) {
    const bc = document.getElementById('gBreadcrumb');
    if (!bc) return;
    if (!graphFocus) { bc.textContent = 'Nothing focused — select any node to orient the graph around it'; return; }
    const n = byId[graphFocus];
    bc.innerHTML = `<span class="g-type-tag">${GTYPE_LABEL[n.type]}</span> Focused on <b>${esc(n.label)}</b>`;
  }

  function renderGraphInspector(byId) {
    const panel = document.getElementById('gInspector');
    if (!graphFocus) {
      panel.innerHTML = '<div class="g-empty">Select a job, skill, or sector to see how it connects through the rest of your profile.</div>';
      return;
    }
    const n = byId[graphFocus];
    const rels = graphNeighbors(graphFocus);
    const groups = {};
    rels.forEach(r => { const t = byId[r.id] && byId[r.id].type; if (t) (groups[t] = groups[t] || []).push(r); });

    let html = `<div class="g-itype">${GTYPE_LABEL[n.type]}</div><h2>${esc(n.label)}</h2>`;
    if (n.type === 'job') {
      const j = n.job;
      html += `<div class="g-isub">${esc(j.company)} · ${esc(j.location)}${j.salary ? ' · ' + esc(j.salary) : ''}</div>
        <div class="g-score-row"><span>Match <b>${esc(j.score)}</b>/100</span><span>Confidence <b>${Math.round((j.confidence || 0) * 100)}%</b></span></div>
        ${j.why ? `<div class="g-why">${esc(j.why)}</div>` : ''}
        ${j.url && j.url !== '#' ? `<a class="g-apply" href="${esc(j.url)}" target="_blank" rel="noopener">View &amp; apply ↗</a>` : ''}
        <p style="font-size:11px;color:var(--dim);">Found via ${esc(j.source)} — applying is always your call.</p>`;
    } else if (n.type === 'sector') {
      const count = (n.jobIds || []).length;
      html += `<div class="g-isub">${count} open role${count === 1 ? '' : 's'} currently in this sector</div>`;
    } else {
      html += `<div class="g-isub">${n.type === 'gap' ? 'Wanted by the market — not yet in your profile' : 'In your profile'}</div>`;
    }

    G_TYPE_ORDER.filter(t => groups[t]).forEach(t => {
      html += `<div class="g-rel-group"><h3>${GTYPE_LABEL[t]}${groups[t].length > 1 ? 's' : ''}</h3>` +
        groups[t].map(r => `<button class="g-rel-item" data-id="${esc(r.id)}">${esc((byId[r.id] || {}).label || '')}<span class="gw">${Math.round(r.w * 100)}%</span></button>`).join('') +
        '</div>';
    });
    panel.innerHTML = html;
    panel.querySelectorAll('.g-rel-item').forEach(el => el.addEventListener('click', () => setGraphFocus(el.dataset.id)));
  }

  function setGraphFocus(id) {
    graphFocus = id;
    layoutGraph();
  }

  addEventListener('resize', () => {
    if (view === 'graph' && DATA && DATA.jobs && DATA.jobs.length) layoutGraph();
  });

  /* ---------- controls wiring ---------- */
  const viewBtns = {
    graph: document.getElementById('viewGraph'),
    matrix: document.getElementById('viewMatrix'),
    ledger: document.getElementById('viewLedger'),
  };

  function render() {
    if (!DATA) return;
    for (const [name, btn] of Object.entries(viewBtns)) {
      btn.classList.toggle('active', view === name);
      btn.setAttribute('aria-selected', view === name);
    }
    document.getElementById('graphView').hidden = view !== 'graph';
    document.getElementById('matrixView').hidden = view !== 'matrix';
    document.getElementById('ledgerView').hidden = view !== 'ledger';
    document.getElementById('views').classList.toggle('graph-active', view === 'graph');
    document.getElementById('jobSortCtl').style.display = view === 'graph' ? 'none' : '';
    document.getElementById('skillSortCtl').style.display = view === 'matrix' ? '' : 'none';
    if (view === 'graph') renderGraph();
    else if (view === 'matrix') renderMatrix();
    else renderLedger();

    const note = document.getElementById('metaNote');
    if (DATA.sample) {
      note.textContent = 'Sample data — live matches appear after the career agent’s first run.';
    } else if (DATA.generated_at) {
      const t = DATA.totals || {};
      const counter = t.discovered_all_time
        ? t.discovered_all_time.toLocaleString() + ' qualifying jobs found to date · ' : '';
      const prefix = view === 'matrix' ? 'Cell depth = skill centrality to the posting · '
        : view === 'ledger' ? 'Ranked by confidence-weighted match · '
        : 'Select any node to see why it connects · ';
      note.textContent = prefix + counter + 'updated ' + new Date(DATA.generated_at).toLocaleDateString();
    }
  }

  for (const [name, btn] of Object.entries(viewBtns)) {
    btn.addEventListener('click', () => {
      view = name;
      localStorage.setItem('skillsView', name);
      closeRolodex();
      render();
    });
  }
  document.getElementById('jobSort').addEventListener('change', e => { jobSort = e.target.value; render(); });
  document.getElementById('skillSort').addEventListener('change', e => { skillSort = e.target.value; render(); });

  document.getElementById('legend').addEventListener('click', e => {
    const key = e.target.closest('.key[data-cat]');
    if (!key) return;
    const cat = key.dataset.cat;
    if (catOff.has(cat)) catOff.delete(cat);
    else catOff.add(cat);
    key.classList.toggle('off', catOff.has(cat));
    render();
  });

  /* ---------- boot ---------- */
  fetch(DATA_URL)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => { DATA = stripBlocked((data.jobs || []).length ? data : SAMPLE); render(); })
    .catch(() => { DATA = stripBlocked(SAMPLE); render(); });
</script>
</body>
</html>
